<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Carolzinha... 🌸</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #faf6f7 0%, #fceef2 100%);
            color: #2b2b2b;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Menu de 3 pontos do Criador */
        .admin-trigger {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #bfa3a8;
            z-index: 1000;
            padding: 10px;
            transition: color 0.3s;
        }
        .admin-trigger:hover {
            color: #ff5e7e;
        }

        /* Telas Principais */
        .screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 88%;
            max-width: 400px;
            padding: 40px 25px;
            border-radius: 24px;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .hidden {
            display: none !important;
        }

        /* Estética Romântica Premium Clean */
        .card-romantic {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 35px rgba(224, 182, 191, 0.3);
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 30px;
            color: #3a3a3a;
        }

        /* Área Segura de Movimentação dos Botões */
        .btn-container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100%;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        button {
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff5e7e 0%, #ff4766 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(255, 94, 126, 0.3);
        }
        .btn-yes:active {
            transform: scale(0.95);
        }

        .btn-no {
            background-color: #f0e4e6;
            color: #7a6e71;
        }

        /* Tela 3: Sucesso */
        #screen-success h2 {
            color: #ff4766;
        }

        /* Painel Admin Oculto */
        #admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(43, 35, 37, 0.96);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .admin-content {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
        }

        .admin-content h3 {
            color: #ff5e7e;
            margin-bottom: 20px;
        }

        .log-item {
            background: #fcf8f9;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 14px;
            border-left: 3px solid #ff5e7e;
            color: #4a4a4a;
        }

        .btn-close-admin {
            background: #4a3b3d;
            color: white;
            margin-top: 15px;
            width: 100%;
        }

        /* Corações Pretos Apagados de Fundo */
        .bg-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.02;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
            background-size: 55px;
        }

        /* Efeito de Sakura Delicado */
        .sakura-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            background-color: #ffccd5;
            border-radius: 150px 0px 150px 150px;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(105vh) translateX(90px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="admin-trigger" onclick="abrirAdmin()">⋮</div>
    <div class="bg-hearts"></div>
    <div class="sakura-bg" id="sakura-particles"></div>

    <div class="screen card-romantic" id="screen-init">
        <h2>Você tem uma mensagem, deseja abrir?</h2>
        <div class="btn-container">
            <button class="btn-yes" onclick="aceitarAbertura()">SIM</button>
            <button class="btn-no" id="btn-no-init" onclick="negarAbertura()">NÃO</button>
        </div>
    </div>

    <div class="screen card-romantic hidden" id="screen-proposal">
        <h2 id="proposal-text">Quer namorar comigo?</h2>
        <div id="move-area" style="position: relative; width: 100%; height: 160px; margin-top: 10px;">
            <button class="btn-yes" id="btn-yes-final" onclick="aceitarNamoro()" style="position: absolute; left: 10%; top: 55px;">SIM</button>
            <button class="btn-no" id="btn-no-final" onmouseover="fugirBotao()" onclick="fugirBotao()" style="position: absolute; right: 10%; top: 55px;">NÃO</button>
        </div>
    </div>

    <div class="screen card-romantic hidden" id="screen-success">
        <div style="font-size: 45px; margin-bottom: 15px;">🌸</div>
        <h2>Seja bem-vinda ao meu coração, aqui você só terá amor e carinho.</h2>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="admin-content">
            <h3>Painel do Criador 😎</h3>
            <div id="admin-logs"></div>
            <button class="btn-close-admin" onclick="fecharAdmin()">Fechar Painel</button>
        </div>
    </div>

    <script>
        let contagemNao = 0;
        const SENHA_CRIADOR = "king123"; 
        
        // Link do seu Formspree inserido com sucesso!
        const FORMSPREE_URL = "https://formspree.io/f/xvznjnbw";

        if (!localStorage.getItem('statusPedido')) {
            localStorage.setItem('statusPedido', 'Aguardando abertura...');
            localStorage.setItem('tentativasNao', '0');
        }

        function reportarAcao(eventoDescricao) {
            if (!FORMSPREE_URL || FORMSPREE_URL.includes("SUA_URL_DO_FORMSPREE")) return;

            fetch(FORMSPREE_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    Alerta: eventoDescricao,
                    Horario: new Date().toLocaleString("pt-BR"),
                    Plataforma: "King Dev Academy"
                })
            }).catch(err => console.error("Erro no report:", err));
        }

        window.addEventListener('DOMContentLoaded', () => {
            reportarAcao("O link do site acabou de ser aberto por alguém!");
        });

        function negarAbertura() {
            document.getElementById('btn-no-init').style.display = 'none';
            alert("Sinto muito, o não, não é uma escolha.");
            localStorage.setItem('statusPedido', 'Tentou clicar NÃO na abertura');
            
            reportarAcao("Tentaram clicar em 'NÃO' no envelope de abertura.");
        }

        function aceitarAbertura() {
            document.getElementById('screen-init').classList.add('hidden');
            gerarSakura();
            document.getElementById('screen-proposal').classList.remove('hidden');
            localStorage.setItem('statusPedido', 'Abriu a mensagem do pedido');
            
            reportarAcao("O envelope foi aberto e a pergunta principal apareceu na tela.");
        }

        function fugirBotao() {
            contagemNao++;
            localStorage.setItem('tentativasNao', contagemNao);
            localStorage.setItem('statusPedido', `Tentou recusar o namoro ${contagemNao} vez(es)`);

            const btnNo = document.getElementById('btn-no-final');
            const textoProposta = document.getElementById('proposal-text');

            if (contagemNao === 1) {
                textoProposta.innerText = "PENSA MELHOR";
            } else if (contagemNao >= 2) {
                textoProposta.innerText = "POR FAVOR!";
            }

            const area = document.getElementById('move-area');
            const btnYes = document.getElementById('btn-yes-final');

            const maxX = area.clientWidth - btnNo.clientWidth;
            const maxY = area.clientHeight - btnNo.clientHeight;

            let randomX, randomY;
            let distanciaDoYes = 0;

            const yesX = btnYes.offsetLeft;
            const yesY = btnYes.offsetTop;

            do {
                randomX = Math.floor(Math.random() * maxX);
                randomY = Math.floor(Math.random() * maxY);
                distanciaDoYes = Math.sqrt(Math.pow(randomX - yesX, 2) + Math.pow(randomY - yesY, 2));
            } while (distanciaDoYes < 110);

            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';

            reportarAcao(`O botão fugiu! Tentaram clicar em 'NÃO' pela ${contagemNao}ª vez.`);
        }

        function aceitarNamoro() {
            document.getElementById('screen-proposal').classList.add('hidden');
            document.getElementById('screen-success').classList.remove('hidden');
            localStorage.setItem('statusPedido', 'ACEITOU O NAMORO! 🎉❤️');
            
            reportarAcao("🚨 RESPOSTA FINAL: O botão 'SIM' foi clicado! O namoro foi aceito com sucesso! 🎉❤️");
        }

        function abrirAdmin() {
            let senha = prompt("Digite a senha do Criador:");
            if (senha === SENHA_CRIADOR) {
                const status = localStorage.getItem('statusPedido');
                const recusou = localStorage.getItem('tentativasNao');
                
                document.getElementById('admin-logs').innerHTML = `
                    <div class="log-item"><strong>Status:</strong> ${status}</div>
                    <div class="log-item"><strong>Recusas no Não:</strong> ${recusou} vezes</div>
                `;
                document.getElementById('admin-panel').classList.remove('hidden');
            } else if (senha !== null) {
                alert("Senha incorreta!");
            }
        }

        function fecharAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
        }

        function gerarSakura() {
            const container = document.getElementById('sakura-particles');
            const totalPetalas = 28;

            for (let i = 0; i < totalPetalas; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                
                const size = Math.random() * 8 + 6; 
                petal.style.width = size + 'px';
                petal.style.height = size + 'px';
                petal.style.left = Math.random() * 100 + 'vw';
                
                petal.style.animationDuration = (Math.random() * 3 + 4) + 's';
                petal.style.animationDelay = Math.random() * 4 + 's';
                
                container.appendChild(petal);
            }
        }
    </script>
</body>
</html>
